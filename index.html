<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .icon {
            font-size: 60px;
            color: #f39c12;
            animation: blink 1.5s infinite alternate;
        }
        @keyframes blink {
            0% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        h1 {
            font-size: 28px;
            margin: 20px 0;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .link {
            text-decoration: none;
            color: #f39c12;
            font-size: 20px;
            transition: 0.3s;
        }
        .link:hover {
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-tools icon"></i>
        <h1>Website Under Maintenance</h1>
        <p>I'm making some improvements to enhance your experience. Please check back soon!</p>
        <a href="https://github.com/ayushverma2909" class="link">
            <i class="fab fa-github"></i> Visit My GitHub
        </a>
    </div>
</body>
</html>
